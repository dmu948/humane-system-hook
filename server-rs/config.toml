[llm]
provider = "gemini"          # "gemini", "anthropic", "openai", "openai-compatible", "echo"
model = "gemini-2.5-flash"   # model ID for the provider
# api_key = "..."            # optional, overrides env var
# base_url = "..."           # optional, for openai-compatible providers
# gemini_google_search = true # enable built-in Google Search grounding (Gemini only)

[llm.tools]
enabled = true
# Tool embeddings use the model embedded into the server binary at build time.
dynamic_tool_count = 8
max_tool_turns = 5
tool_concurrency = 2

[llm.memory]
enabled = true
path = "./data/assistant-memory.mv2"
top_k = 5
snippet_chars = 500
max_context_chars = 1500
auto_retrieve = true
auto_remember = false

[server]
port = 9090
public_addr = "..."          # optional, reachable address of the server
system_prompt = "You are a helpful assistant running on a Humane AI Pin. Keep responses concise - they will be displayed on a laser projector and spoken aloud."
status_prompt = """
Current request status:
- Current timestamp: {{current_timestamp}}
- Current date: {{current_date}}
- Current time: {{current_time}}
{{#if location_name}}- User location: {{location_name}}{{else}}- User location: unknown
{{/if}}{{#if coordinates}}- User coordinates: {{coordinates}}
{{/if}}
This status applies to the current user request only. If it conflicts with earlier conversation history, prefer this current status.
"""

[storage]
media_dir = "./media"       # directory for captured photos, videos, and notes

[weather]
# pirate_weather_api_key = "your-key-here"  # from https://pirate-weather.apiable.io
