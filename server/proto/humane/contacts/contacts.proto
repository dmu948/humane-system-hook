// Reconstructed from decompiled protobuf-lite Java classes.
// ContactsRPCService — contact management.

syntax = "proto3";

package humane.contacts;

option java_multiple_files = true;

// ---- Messages ----

message Name {
  string unstructured_name = 1;
  string first_name = 2;
  string last_name = 3;
}

message PhoneNumber {
  string number = 1;
  string label = 2;
}

message Email {
  string address = 1;
  string label = 2;
}

enum ContactSource {
  CONTACT_SOURCE_UNSPECIFIED = 0;
  CONTACT_SOURCE_GOOGLE = 1;
  CONTACT_SOURCE_ICLOUD = 2;
  CONTACT_SOURCE_DEVICE = 3;
}

message Organization {
  string name = 1;
  string title = 2;
}

message SocialProviderAttribute {
  string key = 1;
  string value = 2;
}

message SocialHandle {
  string provider = 1;
  string handle = 2;
  repeated SocialProviderAttribute attributes = 3;
}

message ContactAction {
  // deprecated, fields unknown
}

message Contact {
  string id = 1;
  Name name = 2;
  repeated PhoneNumber phone_numbers = 3;
  repeated Email emails = 4;
  bool favorite = 5;
  int32 version = 6;
  repeated ContactAction actions = 7 [deprecated = true];
  ContactSource source = 8;
  Organization organization = 9;
  repeated SocialHandle social_handles = 10;
}

message GetContactsRequest {
  bool encrypted_contacts = 1 [deprecated = true];
}

message ContactList {
  repeated Contact contacts = 1;
}

// ---- Service ----

service ContactsRPCService {
  rpc GetContacts (GetContactsRequest) returns (ContactList);
}
